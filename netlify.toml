[build]
  publish = "public"
  functions = "netlify/functions"
  # Build the bridge installer zips fresh from bridge/ on every deploy so
  # the files served at /orca-bridge-*.zip always match the source scripts.
  command = "zip -j public/orca-bridge-windows.zip bridge/install-windows.bat && zip -j public/orca-bridge-mac.zip bridge/install-mac.command"

[dev]
  port = 8888

# API → Netlify Functions (committed so the repo is self-contained;
# previously only configured in the Netlify dashboard).
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Force HTTPS
[[redirects]]
  from   = "http://melodic-gumption-c64a78.netlify.app/*"
  to     = "https://melodic-gumption-c64a78.netlify.app/:splat"
  status = 301
  force  = true

# Clean URL rewrites (extensionless → .html file)
[[redirects]]
  from   = "/rules"
  to     = "/rules.html"
  status = 200

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
