<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ORCA Ireland</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a;--carbon:#141414;--dark:#1a1a1a;--grey:#888;--grey-light:#bbb;--white:#f0f0f0;--orange:#ff6b00;--font-display:'Bebas Neue',sans-serif;--font-body:'Barlow',sans-serif;--font-condensed:'Barlow Condensed',sans-serif; }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family:var(--font-body);background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased; }
  .card { background:var(--carbon);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:40px;width:100%;max-width:420px; }
  .logo { font-family:var(--font-display);font-size:1.4rem;letter-spacing:3px;text-align:center;margin-bottom:28px; }
  .logo .accent { color:var(--orange); }
  h2 { font-family:var(--font-display);font-size:1.6rem;letter-spacing:2px;text-align:center;margin-bottom:8px; }
  .subtitle { color:var(--grey);font-size:0.85rem;text-align:center;margin-bottom:28px;line-height:1.6; }
  .form-group { margin-bottom:16px; }
  label { display:block;font-family:var(--font-condensed);font-weight:700;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:6px; }
  input { width:100%;background:var(--dark);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:12px 14px;color:var(--white);font-family:var(--font-body);font-size:0.95rem;outline:none;transition:border-color 0.3s; }
  input:focus { border-color:rgba(255,107,0,0.5); }
  .btn { width:100%;background:var(--orange);color:var(--black);font-family:var(--font-condensed);font-weight:700;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;padding:14px;border:none;border-radius:6px;cursor:pointer;transition:opacity 0.3s; }
  .btn:disabled { opacity:0.5;cursor:not-allowed; }
  .msg { border-radius:6px;padding:12px 16px;font-size:0.88rem;line-height:1.6;margin-top:16px;display:none; }
  .msg.success { background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);color:#2ecc71; }
  .msg.error { background:rgba(230,57,70,0.08);border:1px solid rgba(230,57,70,0.2);color:#e63946; }
  .back { display:block;text-align:center;margin-top:20px;font-size:0.85rem;color:var(--grey);text-decoration:none; }
  .back:hover { color:var(--orange); }
  .hint { font-size:0.8rem;color:var(--grey);margin-top:6px; }
</style>
</head>
<body>

<div class="card">
  <div class="logo"><span class="accent">ORCA</span> IRELAND</div>

  <!-- STATE 1: Enter new password (token in URL) -->
  <div id="resetForm">
    <h2>NEW PASSWORD</h2>
    <p class="subtitle">Choose a new password for your members area account.</p>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="At least 8 characters" autocomplete="new-password">
      <div class="hint">Minimum 8 characters</div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPass" placeholder="Repeat your password" autocomplete="new-password">
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">Set New Password →</button>
    <div class="msg" id="resetMsg"></div>
  </div>

  <!-- STATE 2: No token / request reset by email -->
  <div id="requestForm" style="display:none;">
    <h2>FORGOT PASSWORD</h2>
    <p class="subtitle">Enter your registered email address and we'll send you a reset link.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="resetEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <button class="btn" id="requestBtn" onclick="doRequest()">Send Reset Link →</button>
    <div class="msg" id="requestMsg"></div>
  </div>

  <a href="/" class="back">← Back to ORCA Ireland</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  // Show appropriate form
  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('requestForm').style.display = 'block';
  }

  async function doReset() {
    const newPass = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    const btn = document.getElementById('resetBtn');
    const msg = document.getElementById('resetMsg');

    msg.style.display = 'none';

    if (newPass.length < 8) {
      msg.className = 'msg error'; msg.textContent = 'Password must be at least 8 characters.'; msg.style.display = 'block'; return;
    }
    if (newPass !== confirmPass) {
      msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; msg.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: newPass }),
      });
      const data = await res.json();

      if (data.success) {
        msg.className = 'msg success';
        msg.textContent = '✓ Password updated! Redirecting to the site...';
        msg.style.display = 'block';
        document.getElementById('resetForm').querySelectorAll('input,button').forEach(el => el.disabled = true);
        setTimeout(() => { window.location.href = '/#members'; }, 2500);
      } else {
        msg.className = 'msg error'; msg.textContent = data.error || 'Something went wrong.'; msg.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set New Password →';
      }
    } catch {
      msg.className = 'msg error'; msg.textContent = 'Network error. Please try again.'; msg.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set New Password →';
    }
  }

  async function doRequest() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn = document.getElementById('requestBtn');
    const msg = document.getElementById('requestMsg');

    msg.style.display = 'none';
    if (!email) { msg.className='msg error';msg.textContent='Please enter your email address.';msg.style.display='block';return; }

    btn.disabled = true; btn.textContent = 'Sending...';

    try {
      const res = await fetch('/api/reset-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      msg.className = 'msg success';
      msg.textContent = '✓ If that email is registered, a reset link has been sent. Check your inbox (and spam folder).';
      msg.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Reset Link →';
    } catch {
      msg.className = 'msg error'; msg.textContent = 'Network error. Please try again.'; msg.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Reset Link →';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') { token ? doReset() : doRequest(); }
  });
</script>

</body>
</html>
